version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manage_service_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST because inside Docker, localhost = the container itself.
      # host.docker.internal points to your Windows host machine where MySQL is running.
      DB_HOST: "host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: manage_service_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
