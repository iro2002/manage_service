services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manage-service-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    env_file:
      - .env.docker
    depends_on: []
    networks:
      - manage-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  manage-network:
    driver: bridge
